<!-- static/index.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dot Cat</title>

<style>

body{
font-family:sans-serif;
background:#f5f6fa;
text-align:center;
margin:40px;
}

#game-container{
position:relative;
width:300px;
margin:auto;
}

canvas{
border-radius:12px;
border:1px solid #ddd;
background:white;
}

#bubble{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:8px 12px;
border-radius:12px;
display:none;
}

#ui{
margin-top:12px;
}

#hearts{
font-size:20px;
color:#ff5a7a;
}

button{
background:#4f7cff;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#3d66d6;
}

</style>
</head>
<body>

<h2>Dot Cat</h2>

<div id="game-container">
<canvas id="game" width="300" height="300"></canvas>
<div id="bubble"></div>
</div>

<div id="ui">
<div id="hearts"></div>
<div id="level"></div>
<div id="personality"></div>
</div>

<br>

<button onclick="snack()">Snack</button>
<button onclick="talk()">고양이 말하기</button>

<br><br>

<input id="chatInput" placeholder="고양이에게 말하기">
<button onclick="chat()">보내기</button>

<script src="/static/game.js"></script>

<script>

function showBubble(t){
const b=document.getElementById("bubble")
b.innerText=t
b.style.display="block"
setTimeout(()=>{b.style.display="none"},5000)
}

async function talk(){
const res=await fetch("/cat")
const d=await res.json()
showBubble(d.message)
}

async function chat(){
const i=document.getElementById("chatInput")
const text=i.value.trim()
if(!text) return
const res=await fetch("/cat?q="+encodeURIComponent(text))
const d=await res.json()
showBubble(d.message)
i.value=""
}

document.getElementById("chatInput")
.addEventListener("keydown",e=>{
if(e.key==="Enter") chat()
})

</script>

</body>
</html>
